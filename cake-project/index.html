<!DOCTYPE html>

 <title>Tamar's Sweet Treats- Home page</title>
 <style>
  /* PAGE STYLING */     
body {
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffe6f0,#fff5e6);
text-align:center;
}

/* HEADER */
header {
background:linear-gradient(135deg,#ff7a9c,#ffb347);
color:white;
padding:40px 20px;
}

header h1 {
margin:0;
font-size:42px;
}

header p {
font-size:18px;
margin-top:10px;
}

/* MAIN CAKE IMAGE */
.main-cake {
margin-top:30px;
border-radius:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

/* MENU SECTION */
.menu {
margin-top:40px;
{

.menu h2 {
color:#c2185b;
font-size:32px;
}

/* MENU CONTAINER */
.menu-container {
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-top:25px;
}

/* CAKE CARD */
.cake-card {
background:white;
padding:20px;
border-radius:15px;
width:230px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
}

.cake-card:hover {
transform:translaterY(-8px);
}

.cake-card img {
width:200px;
height:150px;
object-fit:cover;
border-radius:12px;
margin-bottom:10px;
}
.cake-card h3 {
color:#d2691e;
margin-bottom:8px;
}

.price {
font-size:20px;
color:#c2185b;
font-weight:bold;
margin:10px 0;
}

/* ORDER BUTTON */
.order-btn{
display:inline-block;
margin-top:10px;
padding:10px 18px;
background:#ff7a9c;
color:white;
text-decoration:none;
border-radius:20px;
font-weight:bold;
}
  
.order-btn:hover {
background:#c2185b;
}

/* CONTACT SECTION */
.contact{
margin-top:50px;
padding:30px;
background:#fff;
}
  
.contact h2{
color:#c2185b;
}

/*FOOTER*/
footer {
margin-top:40px;
background:#f8c8dc;
padding:15px;
font-size:14px; 
}

@media(max-width:600px){
.cake-card {
width:90%;
}

.cake-card img {
width:100%;
heigth:auto;
}
}
</style>  
</head>
